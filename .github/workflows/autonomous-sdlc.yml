# Caller workflow — triggers the Autonomous SDLC reusable pipeline
name: Autonomous SDLC

on:
  push:
    branches: [develop, main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  autonomous-sdlc:
    uses: taylor-curran/autonomous-sdlc-platform/.github/workflows/autonomous-sdlc.yml@main
    secrets: inherit
