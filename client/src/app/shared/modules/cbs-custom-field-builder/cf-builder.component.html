<cbs-cf-section
    *ngFor="let section of data; let last = last; let sectionInd=index;"
    [sectionData]="section"
    [url]="urls?.sectionUrl"
    (editErrorChange)="callSectionEditError($event)"
    (editSuccessChange)="callSectionEditSuccess($event)"
    (addSuccessChange)="callSectionAddSuccess($event)"
    (addErrorChange)="callSectionAddError($event)"
    (addCancelChange)="onSectionAddCancel()">

    <cbs-cf-field
        *ngFor="let field of section?.customFields; let fieldInd=index; trackBy: field?.id;"
        [uid]="sectionInd + '_' + fieldInd"
        [url]="urls?.fieldUrl"
        [fieldData]="field"
        [sectionId]="section?.id"
        [addSectionId]="true"
        [lookupTypes]="fieldLookupTypes"
        [fieldTypes]="fieldTypes"
        (fieldEditSuccessChange)="callFieldEditSuccess($event)"
        (fieldEditErrorChange)="callFieldEditError($event)"
        (fieldDeleteSuccessChange)="callFieldDeleteSuccess($event)"
        (fieldDeleteErrorChange)="callFieldDeleteError($event)"
        (fieldAddCancelChange)="onFieldAddCancel($event)"
        (fieldAddSuccessChange)="callFieldAddSuccess($event)"
        (fieldAddErrorChange)="callFieldAddError($event)"
    ></cbs-cf-field>

    <cbs-cf-add [buttonTitle]="'ADD_FIELD' | translate" [disabled]="last && sectionAddMode" (clickChange)="addField(section?.id)"
                [uid]="sectionInd + 1"></cbs-cf-add>
</cbs-cf-section>
<cbs-cf-add [buttonTitle]="'ADD_SECTION' | translate" (clickChange)="addSection()" [disabled]="sectionAddMode"></cbs-cf-add>
