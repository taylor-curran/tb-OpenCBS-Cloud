<cbs-header>
    <cbs-page-header>
        <div cbs-page-header-layout="left">
            <cbs-heading-block headingTitle="{{ 'BRANCH_FIELDS' | translate }}"
                               [svgData]="svgData">
                <cbs-breadcrumb [breadcrumbLinks]="breadcrumbLinks"></cbs-breadcrumb>
            </cbs-heading-block>
        </div>
        <!--/cbs-page-header-layout = left-->
    </cbs-page-header>
    <!-- cbs-page-header -->
</cbs-header>
<!-- cbs-header -->

<main class="cbs-main cbs-main--pt-sm">

    <div class="slds-grid slds-grid--align-center slds-p-top--medium slds-p-bottom--xx-large">
        <div class="slds-container--small">
            <cbs-cf-builder
                [data]="(branchFieldStore | async)?.branchFields"
                [urls]="urls"
                [fieldLookupTypes]="lookupTypes"
                [fieldTypes]="fieldTypes"
                (onSectieditSuccess)="onUpdateSuccess($event)"
                (onSectieditError)="onError($event)"
                (sectionAddSuccess)="onAddSuccess($event)"
                (sectionAddError)="onError($event)"
                (fieldEditSuccess)="onUpdateSuccess($event)"
                (fieldEditError)="onError($event)"
                (onFieldDeleteSuccess)="deleteSuccess($event)"
                (onFieldDeleteError)="onError($event)"
                (onFieldAddSuccess)="onAddSuccess($event)"
                (onFieldAddError)="onError($event)"
            ></cbs-cf-builder>
        </div>
    </div>

    <div *ngIf="!(branchFieldStore | async)?.loading && (branchFieldStore | async)?.error"
         class="slds-text-align--center slds-m-top--medium">
        {{ 'NO_DATA' | translate }}
    </div>

    <cbs-loading-indicator [isFixed]="true"
                           [showLoader]="(branchFieldStore | async)?.loading && isLoading"></cbs-loading-indicator>
</main>
